<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fırınna POS — Güncelleme Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a18;
    --muted: #888880;
    --accent: #2d6a4f;
    --accent-light: #d8f3dc;
    --accent-text: #1b4332;
    --warn: #b5451b;
    --warn-light: #fde8e0;
    --warn-text: #7c2d12;
    --done-line: #aaa;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--text);
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .header-left p {
    font-size: 12px;
    color: #aaa;
    margin-top: 3px;
    font-family: var(--mono);
  }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-text); }

  /* METRICS */
  .metrics {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .metric {
    flex: 1;
    background: var(--surface);
    padding: 14px 20px;
    text-align: center;
  }
  .metric-val {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
  }
  .metric-val.todo { color: var(--warn); }
  .metric-val.done { color: var(--accent); }
  .metric-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 120px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 0;
    height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .sidebar-group-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 18px 6px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 18px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.1s;
    gap: 8px;
  }
  .sidebar-item:hover { background: var(--bg); }
  .sidebar-item.active {
    border-left-color: var(--accent);
    background: var(--accent-light);
  }
  .sidebar-item .file-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-item.active .file-name { color: var(--accent-text); font-weight: 500; }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .badge-todo { background: var(--warn-light); color: var(--warn-text); }
  .badge-done { background: var(--accent-light); color: var(--accent-text); }

  /* MAIN */
  .main {
    padding: 28px 32px;
    max-width: 820px;
  }
  .page-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .page-header h2 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
  }
  .page-header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .section { margin-bottom: 24px; }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 14px;
    font-family: var(--sans);
    color: var(--text);
    background: var(--surface);
    resize: vertical;
    min-height: 100px;
    line-height: 1.7;
    transition: border-color 0.15s;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  /* TASK INPUT */
  .task-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .task-input-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 13px;
    font-family: var(--sans);
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
  }
  .task-input-row input:focus { outline: none; border-color: var(--accent); }
  .task-add-btn {
    padding: 9px 16px;
    font-size: 12px;
    font-family: var(--mono);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }
  .task-add-btn:hover { background: var(--bg); }

  /* TASK LIST */
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: opacity 0.2s;
  }
  .task-item.done { opacity: 0.5; }
  .task-item input[type=checkbox] {
    width: 15px;
    height: 15px;
    margin-top: 2px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .task-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--done-line);
  }
  .del-btn {
    background: none;
    border: none;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    line-height: 1;
    opacity: 0.4;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { opacity: 1; }

  .empty-state {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
    padding: 6px 0;
  }

  /* PRIORITY SELECT */
  .priority-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .priority-select {
    font-family: var(--mono);
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 8px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* FILE HIDDEN INPUT */
  #fileInput { display: none; }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 8px 0; }
    .main { padding: 20px 16px; }
    header { padding: 16px; }
    .metrics { flex-wrap: wrap; }
    .metric { min-width: 33%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>firinna-pos / updates</h1>
    <p id="last-saved">Henüz kaydedilmedi</p>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="document.getElementById('fileInput').click()">JSON yükle</button>
    <input type="file" id="fileInput" accept=".json" onchange="loadFile(event)">
    <button class="btn" onclick="copyForClaude()">Claude için kopyala</button>
    <button class="btn primary" onclick="saveData()">JSON kaydet</button>
  </div>
</header>

<div class="metrics">
  <div class="metric">
    <div class="metric-val" id="m-total">0</div>
    <div class="metric-label">Toplam</div>
  </div>
  <div class="metric">
    <div class="metric-val todo" id="m-todo">0</div>
    <div class="metric-label">Bekleyen</div>
  </div>
  <div class="metric">
    <div class="metric-val done" id="m-done">0</div>
    <div class="metric-label">Tamamlanan</div>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<div id="toast"></div>

<script>
const PAGES = [
  { id: 'index',      label: 'index.html',      group: 'Şablonlar',  desc: 'Ana sayfa / Masalar' },
  { id: 'products',   label: 'products.html',    group: 'Şablonlar',  desc: 'Ürün yönetimi' },
  { id: 'tables',     label: 'tables.html',      group: 'Şablonlar',  desc: 'Masa yönetimi' },
  { id: 'kasa',       label: 'kasa.html',        group: 'Şablonlar',  desc: 'Kasa modülü' },
  { id: 'muhasebe',   label: 'muhasebe.html',    group: 'Şablonlar',  desc: 'Muhasebe' },
  { id: 'stok',       label: 'stok.html',        group: 'Şablonlar',  desc: 'Stok takibi' },
  { id: 'recete',     label: 'recete.html',      group: 'Şablonlar',  desc: 'Reçete yönetimi' },
  { id: 'reports',    label: 'reports.html',     group: 'Şablonlar',  desc: 'Raporlar' },
  { id: 'expenses',   label: 'expenses.html',    group: 'Şablonlar',  desc: 'Masraflar' },
  { id: 'settings',   label: 'settings.html',    group: 'Şablonlar',  desc: 'Ayarlar' },
  { id: 'backup',     label: 'backup.html',      group: 'Şablonlar',  desc: 'Yedekleme' },
  { id: 'qr_order',   label: 'qr_order.html',    group: 'Şablonlar',  desc: 'QR sipariş' },
  { id: 'apppy',      label: 'app.py',           group: 'Backend',    desc: 'Flask ana uygulama' },
  { id: 'databasepy', label: 'database.py',      group: 'Backend',    desc: 'Veritabanı işlemleri' },
  { id: 'printerpy',  label: 'printer.py',       group: 'Backend',    desc: 'Yazıcı modülü' },
  { id: 'cssjs',      label: 'style.css / app.js', group: 'Statik', desc: 'CSS ve JavaScript' },
  { id: 'genel',      label: 'Genel',            group: 'Diğer',      desc: 'Sayfa dışı / genel notlar' },
];

let state = {};
PAGES.forEach(p => { state[p.id] = { notes: '', tasks: [] }; });
let activePage = PAGES[0].id;

function getPage(id) { return state[id] || { notes: '', tasks: [] }; }

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  PAGES.forEach(p => {
    if (!groups[p.group]) groups[p.group] = [];
    groups[p.group].push(p);
  });

  let html = '';
  for (const [group, pages] of Object.entries(groups)) {
    html += `<div class="sidebar-group-label">${group}</div>`;
    pages.forEach(p => {
      const pg = getPage(p.id);
      const todo = pg.tasks.filter(t => !t.done).length;
      const done = pg.tasks.filter(t => t.done).length;
      const badge = todo > 0
        ? `<span class="badge badge-todo">${todo}</span>`
        : done > 0
        ? `<span class="badge badge-done">${done}</span>`
        : '';
      html += `<div class="sidebar-item${activePage === p.id ? ' active' : ''}" onclick="setPage('${p.id}')">
        <span class="file-name">${p.label}</span>${badge}
      </div>`;
    });
  }
  sidebar.innerHTML = html;
}

function renderMain() {
  const pg = getPage(activePage);
  const info = PAGES.find(p => p.id === activePage);
  const main = document.getElementById('main');

  const taskRows = pg.tasks.map((t, i) => `
    <div class="task-item${t.done ? ' done' : ''}" id="task-${activePage}-${i}">
      <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
      <span class="task-text">${escHtml(t.text)}</span>
      <button class="del-btn" onclick="deleteTask(${i})">×</button>
    </div>
  `).join('');

  main.innerHTML = `
    <div class="page-header">
      <h2>${info.label}</h2>
      <p>${info.desc}</p>
    </div>

    <div class="section">
      <div class="section-label">Notlar &amp; İstekler</div>
      <textarea id="notes-area" placeholder="Bu dosya için sorunlar, istekler, açıklamalar...">${escHtml(pg.notes)}</textarea>
    </div>

    <div class="section">
      <div class="section-label">Görevler</div>
      <div class="task-input-row">
        <input type="text" id="task-input" placeholder="Yeni görev..." onkeydown="if(event.key==='Enter')addTask()">
        <button class="task-add-btn" onclick="addTask()">+ Ekle</button>
      </div>
      <div class="task-list" id="task-list">
        ${pg.tasks.length === 0 ? '<div class="empty-state">Henüz görev yok.</div>' : taskRows}
      </div>
    </div>
  `;

  document.getElementById('notes-area').addEventListener('input', function() {
    state[activePage].notes = this.value;
    updateMetrics();
  });
}

function setPage(id) {
  activePage = id;
  renderSidebar();
  renderMain();
}

function addTask() {
  const inp = document.getElementById('task-input');
  const text = inp.value.trim();
  if (!text) return;
  state[activePage].tasks.push({ text, done: false });
  inp.value = '';
  updateMetrics();
  renderSidebar();
  renderMain();
  setTimeout(() => { const el = document.getElementById('task-input'); if (el) el.focus(); }, 30);
}

function toggleTask(i) {
  state[activePage].tasks[i].done = !state[activePage].tasks[i].done;
  updateMetrics();
  renderSidebar();
  renderMain();
}

function deleteTask(i) {
  state[activePage].tasks.splice(i, 1);
  updateMetrics();
  renderSidebar();
  renderMain();
}

function updateMetrics() {
  let total = 0, todo = 0, done = 0;
  PAGES.forEach(p => {
    (state[p.id]?.tasks || []).forEach(t => { total++; t.done ? done++ : todo++; });
  });
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-todo').textContent = todo;
  document.getElementById('m-done').textContent = done;
}

function saveData() {
  const json = JSON.stringify({ version: 1, updated: new Date().toISOString(), state }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'firinna-updates.json';
  a.click();
  document.getElementById('last-saved').textContent = 'Son kayıt: ' + new Date().toLocaleTimeString('tr-TR');
  toast('firinna-updates.json indirildi');
}

function loadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.state) {
        state = data.state;
        PAGES.forEach(p => { if (!state[p.id]) state[p.id] = { notes: '', tasks: [] }; });
        document.getElementById('last-saved').textContent = 'Yüklendi: ' + (data.updated ? new Date(data.updated).toLocaleString('tr-TR') : '?');
        updateMetrics();
        renderSidebar();
        renderMain();
        toast('JSON yüklendi');
      }
    } catch(err) { toast('JSON okunamadı!'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function copyForClaude() {
  let out = '# Fırınna POS — Güncelleme Talepleri\n\n';
  let hasContent = false;
  PAGES.forEach(p => {
    const pg = state[p.id];
    const hasTasks = pg.tasks.length > 0;
    const hasNotes = pg.notes.trim().length > 0;
    if (!hasTasks && !hasNotes) return;
    hasContent = true;
    out += `## ${p.label} — ${PAGES.find(x=>x.id===p.id).desc}\n`;
    if (hasNotes) out += `\n${pg.notes.trim()}\n`;
    if (hasTasks) {
      out += '\n### Görevler\n';
      pg.tasks.forEach(t => { out += `- [${t.done ? 'x' : ' '}] ${t.text}\n`; });
    }
    out += '\n---\n\n';
  });
  if (!hasContent) { toast('Henüz içerik yok.'); return; }
  navigator.clipboard.writeText(out).then(() => toast('Panoya kopyalandı — sohbete yapıştır'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

updateMetrics();
renderSidebar();
renderMain();
</script>
</body>
</html>
