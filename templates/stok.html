<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok - Fırınna POS</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root { --green: #2d6a4f; --red: #dc2626; --gold: #d97706; --bg: #f0f4f1; }
        body { background: var(--bg); }

        .page-header {
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #40916c 100%);
            color: white; padding: 1.4rem 2rem 1.2rem;
            border-radius: 0 0 20px 20px; margin-bottom: 1.5rem;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .75rem;
        }
        .page-header h1 { margin:0; font-size:1.4rem; font-weight:700; }

        /* ── Anlık Stok Durumu ── */
        .durum-panel {
            background: white; border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.09); margin-bottom: 1.5rem; overflow: hidden;
        }
        .durum-header {
            background: #1b4332; color: white; padding: .85rem 1.5rem;
            font-weight: 700; font-size: .9rem; letter-spacing: .5px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .durum-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
            padding: 1.1rem 1.5rem; gap: .75rem;
        }
        .dur-item { text-align: center; padding: .75rem .5rem;
                    background: #f8fafc; border-radius: 10px; }
        .dur-val { font-size: 1.35rem; font-weight: 800; line-height: 1; }
        .dur-lbl { font-size: .71rem; color: #94a3b8; font-weight: 600;
                   text-transform: uppercase; letter-spacing: .4px; margin-top: .3rem; }

        /* Kritik stok uyarı şeridi */
        .kritik-serit {
            margin: 0 1.5rem 1.25rem; padding: .85rem 1rem;
            background: #fff5f5; border: 1.5px solid #fed7d7;
            border-radius: 10px; display: none;
        }
        .kritik-serit.show { display: block; }
        .kritik-title { color: #c53030; font-weight: 700; font-size: .85rem; margin-bottom: .5rem; }
        .kritik-items { display: flex; flex-wrap: wrap; gap: .4rem; }
        .kritik-tag { background: #fed7d7; color: #c53030; padding: .25rem .65rem;
                      border-radius: 20px; font-size: .78rem; font-weight: 600; }

        /* ── Sekmeler ── */
        .stok-tabs { display:flex; gap:0; border-bottom:2px solid #e2e8f0; margin-bottom:1.5rem; }
        .stok-tab { padding:.7rem 1.4rem; border:none; background:none; font-size:.92rem;
                    font-weight:600; color:#718096; cursor:pointer;
                    border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .18s; }
        .stok-tab:hover { color:var(--green); }
        .stok-tab.active { color:var(--green); border-bottom-color:var(--green); }

        /* ── Tablolar ── */
        .stok-table { width:100%; border-collapse:collapse; font-size:.88rem; }
        .stok-table th { background:#f7fafc; padding:.7rem .9rem; text-align:left;
                         color:#4a5568; font-weight:600; border-bottom:2px solid #e2e8f0; }
        .stok-table td { padding:.65rem .9rem; border-bottom:1px solid #f0f0f0; }
        .stok-table tr:hover td { background:#fafafa; }
        .qty-low  { color:#dc2626; font-weight:700; }
        .qty-ok   { color:#2d6a4f; font-weight:700; }
        .qty-neg  { color:#7c3aed; font-weight:800; }
        .neg-tag  { background:#ede9fe; color:#6d28d9; padding:.15rem .5rem;
                    border-radius:20px; font-size:.7rem; font-weight:700; margin-left:.3rem; }

        .badge { padding:.2rem .6rem; border-radius:20px; font-size:.72rem; font-weight:700; }
        .badge-in  { background:#d1fae5; color:#065f46; }
        .badge-out { background:#fee2e2; color:#991b1b; }
        .badge-adj { background:#fef3c7; color:#92400e; }

        /* Yeni kalem formu */
        .add-form-card { background:white; border-radius:14px; padding:1.25rem 1.5rem;
                         box-shadow:0 2px 8px rgba(0,0,0,.07); margin-bottom:1.5rem; }
        .add-form-title { font-weight:700; color:#374151; margin-bottom:1rem;
                          font-size:.95rem; display:flex; align-items:center; gap:.4rem; }
        .form-row { display:flex; gap:.5rem; flex-wrap:wrap; align-items:flex-end; }
        .form-row input, .form-row select {
            padding:.5rem .75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:.88rem; }
        .form-row input[type=text] { flex:2; min-width:130px; }
        .form-row input[type=number] { flex:1; min-width:90px; }
        .form-row select { flex:1; min-width:90px; }

        /* Hareketler filtre */
        .filter-bar { background:white; border-radius:14px; padding:1.1rem 1.5rem;
                      box-shadow:0 2px 8px rgba(0,0,0,.07); margin-bottom:1.25rem;
                      display:flex; gap:.75rem; flex-wrap:wrap; align-items:center; }
        .filter-bar label { font-weight:600; color:#4a5568; font-size:.87rem; }
        .filter-bar select, .filter-bar input {
            padding:.45rem .75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:.87rem; }
        .btn-filtrele { padding:.45rem 1rem; background:var(--green); color:white;
                        border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:.87rem; }

        /* Hareket modal */
        .move-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
                      z-index:1000; align-items:center; justify-content:center; }
        .move-modal.open { display:flex; }
        .move-box { background:white; border-radius:16px; padding:2rem;
                    min-width:360px; max-width:95vw; }
        .move-box h3 { margin:0 0 1.5rem; }

        .no-data { text-align:center; color:#a0aec0; padding:2rem; }
        .card { background:white; border-radius:14px; padding:1.5rem;
                box-shadow:0 2px 8px rgba(0,0,0,.07); margin-bottom:1.25rem; }
    </style>
</head>
<body>
    {% include '_navbar.html' %}
</body>
</html>
