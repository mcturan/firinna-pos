<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Yönetimi - Fırınna POS</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🍽️ Fırınna POS</div>
        <div class="nav-links">
            <a href="/">Masalar</a>
            <div class="nav-dropdown" id="navDropdown">
                <button class="nav-dropdown-btn" onclick="toggleNav()">⚙️ Yönetim ▾</button>
                <div class="nav-dropdown-menu">
            <a href="/kasa">💰 Kasa</a>
            <a href="/muhasebe">📒 Muhasebe</a>
            <hr>
            <a href="/products" class="active">🍞 Ürünler</a>
            <a href="/stok">📦 Stok</a>
            <a href="/recete">🧾 Reçete</a>
            <a href="/expenses">📤 Masraflar</a>
            <a href="/tables">🪑 Masa Yönetimi</a>
            <hr>
            <a href="/settings">⚙️ Ayarlar</a>
                </div>
            </div>
        </div>
    </nav>
    <script>
        function toggleNav() {
            document.getElementById('navDropdown').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            const dd = document.getElementById('navDropdown');
            if (dd && !dd.contains(e.target)) dd.classList.remove('open');
        });
    </script>

    <div class="container">
        <!-- Excel İmport/Export Bar -->
        <div style="display:flex;gap:.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
            <span style="font-weight:700;color:#4a5568;font-size:.95rem;">📊 Excel:</span>
            <button onclick="downloadTemplate()" style="padding:.5rem 1rem;background:#217346;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem;">
                📥 Şablon İndir / Dışa Aktar
            </button>
            <label style="padding:.5rem 1rem;background:#1d6fa5;color:white;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem;">
                📤 Excel'den Güncelle
                <input type="file" id="excelFile" accept=".csv,.xlsx,.xls" style="display:none;" onchange="handleExcelImport(event)">
            </label>
            <span id="importStatus" style="font-size:.85rem;color:#718096;"></span>
        </div>

        <div class="management-grid">
            <!-- Kategoriler -->
            <div class="management-section">
                <h2>Kategoriler</h2>
                <form id="categoryForm" class="add-form">
                    <input type="text" id="categoryName" placeholder="Kategori adı" required>
                    <input type="color" id="categoryColor" value="#3B82F6">
                    <button type="submit" class="btn btn-primary">➕ Ekle</button>
                </form>
                
                <div id="categoriesList" class="items-list"></div>
            </div>

            <!-- Ürünler -->
            <div class="management-section">
                <h2>Ürünler</h2>
                <form id="productForm" class="add-form">
                    <input type="text" id="productName" placeholder="Ürün adı" required>
                    <select id="productCategory" required>
                        <option value="">Kategori seç</option>
                    </select>
                    <input type="number" id="productPrice" placeholder="Fiyat" step="0.01" required>
                    <button type="submit" class="btn btn-primary">➕ Ekle</button>
                </form>
                
                <div id="productsList" class="items-list"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadCategories();
            loadProducts();

            document.getElementById('categoryForm').onsubmit = async function(e) {
                e.preventDefault();
                
                const name = document.getElementById('categoryName').value;
                const color = document.getElementById('categoryColor').value;
                
                await fetch('/api/categories', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, color})
                });
                
                document.getElementById('categoryForm').reset();
                document.getElementById('categoryColor').value = '#3B82F6';
                loadCategories();
                loadProducts();
            };

            document.getElementById('productForm').onsubmit = async function(e) {
                e.preventDefault();
                
                const name = document.getElementById('productName').value;
                const category_id = parseInt(document.getElementById('productCategory').value);
                const price = parseFloat(document.getElementById('productPrice').value);
                
                await fetch('/api/products', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, category_id, price})
                });
                
                document.getElementById('productForm').reset();
                loadProducts();
            };
        });

        async function loadCategories() {
            const categories = await fetch('/api/categories').then(r => r.json());
            const categoriesList = document.getElementById('categoriesList');
            const productCategory = document.getElementById('productCategory');
            
            categoriesList.innerHTML = categories.map(cat => `
                <div class="item-row" style="border-left: 4px solid ${cat.color}" id="cat-row-${cat.id}">
                    <span class="item-name">${cat.name}</span>
                    <div style="display:flex;gap:.4rem;">
                        <button class="btn-delete" style="background:none;border:none;cursor:pointer;font-size:1rem;" onclick="editCategory(${cat.id})" data-name="${cat.name}" id="cat-btn-${cat.id}" title="Düzenle">✏️</button>
                        <button class="btn-delete" onclick="deleteCategory(${cat.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            productCategory.innerHTML = '<option value="">Kategori seç</option>' + 
                categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        }

        async function loadProducts() {
            const products = await fetch('/api/products').then(r => r.json());
            const productsList = document.getElementById('productsList');
            
            if (products.length === 0) {
                productsList.innerHTML = '<p class="no-data">Henüz ürün eklenmemiş</p>';
                return;
            }
            
            productsList.innerHTML = products.map(prod => `
                <div class="item-row" id="prod-row-${prod.id}">
                    <div class="item-info">
                        <span class="item-name">${prod.name}</span>
                        <span class="item-meta">${prod.category_name} • ${prod.price.toFixed(2)} TL</span>
                    </div>
                    <div style="display:flex;gap:.4rem;">
                        <button class="btn-delete" style="background:none;border:none;cursor:pointer;font-size:1rem;" onclick="editProduct(${prod.id})" data-name="${prod.name}" data-price="${prod.price}" data-catid="${prod.category_id||0}" id="prod-btn-${prod.id}" title="Düzenle">✏️</button>
                        <button class="btn-delete" onclick="deleteProduct(${prod.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function editCategory(id) {
            const currentName = document.getElementById('cat-btn-' + id).dataset.name;
            const row = document.getElementById('cat-row-' + id);
            row.innerHTML = `
                <input type="text" id="cat-edit-${id}" value="${currentName}"
                    style="flex:1;padding:.4rem .6rem;border:2px solid #4299e1;border-radius:6px;font-size:.95rem;">
                <div style="display:flex;gap:.4rem;">
                    <button class="btn btn-primary" style="padding:.35rem .75rem;" onclick="saveCategoryEdit(${id})">✓</button>
                    <button class="btn btn-secondary" style="padding:.35rem .75rem;" onclick="loadCategories()">✕</button>
                </div>`;
            document.getElementById('cat-edit-' + id).focus();
        }

        async function saveCategoryEdit(id) {
            const name = document.getElementById('cat-edit-' + id).value.trim();
            if (!name) return;
            await fetch(`/api/categories/${id}/name`, {
                method: 'PATCH', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({name})
            });
            loadCategories(); loadProducts();
        }

        function editProduct(id) {
            const btn = document.getElementById('prod-btn-' + id);
            const currentName = btn.dataset.name;
            const currentPrice = parseFloat(btn.dataset.price);
            const currentCatId = btn.dataset.catid;
            const row = document.getElementById('prod-row-' + id);
            const catOptions = Array.from(document.getElementById('productCategory').options)
                .filter(o => o.value)
                .map(o => `<option value="${o.value}" ${o.value == currentCatId ? 'selected' : ''}>${o.text}</option>`)
                .join('');
            row.innerHTML = `
                <div style="display:flex;gap:.4rem;flex:1;flex-wrap:wrap;">
                    <input type="text" id="prod-name-${id}" value="${currentName}"
                        style="flex:2;min-width:120px;padding:.4rem .6rem;border:2px solid #4299e1;border-radius:6px;font-size:.95rem;">
                    <input type="number" id="prod-price-${id}" value="${currentPrice}" step="0.01" min="0"
                        style="flex:1;min-width:80px;padding:.4rem .6rem;border:2px solid #4299e1;border-radius:6px;font-size:.95rem;">
                    <select id="prod-cat-${id}" style="flex:1;min-width:100px;padding:.4rem .6rem;border:2px solid #4299e1;border-radius:6px;font-size:.9rem;">
                        ${catOptions}
                    </select>
                </div>
                <div style="display:flex;gap:.4rem;">
                    <button class="btn btn-primary" style="padding:.35rem .75rem;" onclick="saveProductEdit(${id})">✓</button>
                    <button class="btn btn-secondary" style="padding:.35rem .75rem;" onclick="loadProducts()">✕</button>
                </div>`;
        }

        async function saveProductEdit(id) {
            const name = document.getElementById('prod-name-' + id).value.trim();
            const price = parseFloat(document.getElementById('prod-price-' + id).value);
            const category_id = document.getElementById('prod-cat-' + id).value;
            if (!name || isNaN(price)) return;
            await fetch(`/api/products/${id}`, {
                method: 'PATCH', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({name, price, category_id})
            });
            loadProducts();
        }

        async function deleteCategory(id) {
            if (!confirm('Bu kategoriyi silmek istediğinize emin misiniz?')) return;
            const res = await fetch(`/api/categories/${id}`, {method: 'DELETE'});
            const d = await res.json();
            if (!d.success) { alert('⚠️ ' + d.error); return; }
            loadCategories(); loadProducts();
        }

        async function deleteProduct(id) {
            if (!confirm('Bu ürünü silmek istediğinize emin misiniz?')) return;
            
            const res = await fetch(`/api/products/${id}`, {method: 'DELETE'});
            const data = await res.json();
            if (!data.success) {
                alert('⚠️ ' + (data.error || 'Ürün silinemedi'));
                return;
            }
            loadProducts();
        }

        // === EXCEL IMPORT/EXPORT ===
        function downloadTemplate() {
            // Mevcut ürünleri CSV olarak indir
            window.location.href = '/api/products/excel-export';
        }

        async function handleExcelImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const status = document.getElementById('importStatus');
            status.textContent = '⏳ Okunuyor...';

            const ext = file.name.split('.').pop().toLowerCase();
            let rows = [];

            if (ext === 'csv') {
                const text = await file.text();
                const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
                const headers = lines[0].split(';').map(h=>h.replace(/^\uFEFF/,'').trim());
                for (let i=1; i<lines.length; i++) {
                    const vals = lines[i].split(';');
                    const obj = {};
                    headers.forEach((h,j) => obj[h] = (vals[j]||'').trim());
                    if (obj.name) rows.push(obj);
                }
            } else {
                // xlsx — basit okuma için uyarı
                status.textContent = '⚠️ Lütfen CSV formatında yükleyin. "Şablon İndir" ile CSV alabilirsiniz.';
                event.target.value = '';
                return;
            }

            if (!rows.length) { status.textContent = '⚠️ Veri bulunamadı.'; return; }

            // Önizleme onayla
            const preview = rows.slice(0,5).map(r=>`${r.name} — ${r.price} ₺ (${r.category_name})`).join('\n');
            const more = rows.length > 5 ? `\n...ve ${rows.length-5} satır daha` : '';
            if (!confirm(`${rows.length} satır yüklenecek:\n\n${preview}${more}\n\nDevam edilsin mi?`)) {
                event.target.value = '';
                status.textContent = '';
                return;
            }

            status.textContent = '⏳ Yükleniyor...';
            const res = await fetch('/api/products/excel-import', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rows)
            }).then(r=>r.json());

            status.textContent = `✅ ${res.updated} güncellendi, ${res.added} eklendi${res.errors.length ? ', '+res.errors.length+' hata' : ''}`;
            event.target.value = '';
            loadProducts();
        }
    </script>
    </div><!-- /container -->

    <footer style="text-align:center; padding:2rem 1rem 1.5rem; color:#a0aec0; font-size:.78rem; margin-top:3rem; border-top:1px solid #f0f0f0;">
        Fırınna POS &mdash; TA1XTA &copy; 2026
    </footer>
</body>
</html>
